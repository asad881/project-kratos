name: CI/CD Workflow

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
    types:
    - closed

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    permissions:
      id-token: write
      contents: read

    steps:
    - name: checkout repository code
      uses: actions/checkout@v4

    - name: Set a short github sha
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::819884683254:role/github_action_ecr_role
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: setup docker buildx
      uses: docker/setup-buildx-action@v3

    - name: build docker img
      uses: docker/build-push-action@v6
      with:
        context: ./app
        file: ./app/Dockerfile
        push: true
        tags: |
          ${{steps.login-ecr.outputs.registry}}/ecr_repo_defult:latest
          ${{steps.login-ecr.outputs.registry}}/ecr_repo_defult:${{steps.vars.outputs.sha_short}}
